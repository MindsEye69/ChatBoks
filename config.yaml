projects:
  chatboks:
    path: C:\Users\MindsEye\Desktop\chatboks
    agents: [claude, codex]
    direct_agents: [coordinator, codex_spark]
    primary: codex
    codegraph: true
    routing_intelligence:
      enabled: true
    mode_strategies:
      implement: solo_codex
      review: solo_claude
      confirmation: confirm_round
      diagnose: solo_claude
      bugsearch: full_round
      brainstorm: full_round
    role_routes:
      implement: [codex, claude]
      review: [claude, codex]
      confirmation: [codex, claude]
      bugsearch: [claude, codex]
      diagnose: [claude, codex]
      brainstorm: [claude, codex]
  taskfish:
    path: C:\Users\MindsEye\Desktop\Tasker\tasker-poc
    agents: [claude, codex]
    primary: codex
    codegraph: true
  circuit9:
    path: C:\Users\MindsEye\Desktop\CircuitNine
    agents: [claude, codex]
    primary: codex
    codegraph: true
  tinyguardian:
    path: C:\Users\MindsEye\source\repos\TinyGuardian
    agents: [claude, codex]
    primary: claude
    codegraph: true
  io-website:
    path: C:\Users\MindsEye\Desktop\Information Ontology
    agents: [claude, codex]
    primary: claude
    codegraph: true
  biosassist:
    path: C:\Users\MindsEye\Desktop\BiosAssist\Repo
    agents: [claude, coordinator]
    direct_agents: [coordinator]
    primary: claude
    codegraph: true
    routing_intelligence:
      enabled: true
    mode_strategies:
      brainstorm: full_round
    role_routes:
      brainstorm: [claude, coordinator]

agents:
  coordinator:
    cli: ollama
    runtime: ollama
    endpoint: http://127.0.0.1:11434/api/chat
    model: gemma3:4b
    think: false
    token_limit: 32000
    token_warning: 24000
    max_prompt_chars: 8000
    temperature: 0.1
    num_predict: 512
    can_fill_main_seat: true
    color: magenta
    role_file: COORDINATOR.md
  claude:
    cli: C:\Users\MindsEye\AppData\Roaming\npm\claude.cmd
    adapter_profile: claude_code_print_v1
    token_limit: 180000
    token_warning: 150000
    color: cyan
    role_file: CLAUDE.md
    model_commands:
      - name: ultrareview
        aliases: [/ultrareview, ultrareview]
        type: cli_subcommand
        argv: [ultrareview, "{args}"]
        description: Run Claude Code Ultrareview for the current branch, PR, or target.
        enabled: true
  codex:
    cli: C:\Users\MindsEye\AppData\Roaming\npm\codex.cmd
    adapter_profile: codex_exec_v1
    token_limit: 120000
    token_warning: 100000
    color: green
    role_file: AGENTS.md
  codex_spark:
    cli: C:\Users\MindsEye\AppData\Roaming\npm\codex.cmd
    adapter_profile: codex_spark_exec_v1
    token_limit: 128000
    token_warning: 100000
    can_fill_main_seat: true
    color: bright_green
    role_file: CODEX_SPARK.md
  antigravity:
    cli: agy
    adapter_profile: agy_run_v1
    token_limit: 120000
    token_warning: 100000
    color: yellow
    role_file: ANTIGRAVITY.md

rounds:
  max_before_escalate: 3
  approval_required: true

context:
  recent_chatboks_lines: 50
  session_token_budget_warning: 220000
  session_token_budget_limit: 280000
  codegraph:
    enabled: true
    db_candidates:
      - codegraph.db
      - .codegraph/codegraph.db
      - .codegraph/index.db
    max_files: 200
    max_symbols: 250
    max_edges: 150
